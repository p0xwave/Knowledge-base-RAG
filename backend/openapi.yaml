openapi: 3.1.0
info:
  title: FastAPI
  version: 0.1.0
paths:
  /api/user/auth:
    post:
      tags:
      - User
      summary: User Auth
      operationId: user_auth_api_user_auth_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAuth'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/user:
    put:
      tags:
      - User
      summary: User Update
      operationId: user_update_api_user_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChanges'
        required: true
      responses:
        '204':
          description: Successful Response
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - User
      summary: User Delete
      operationId: user_delete_api_user_delete
      responses:
        '204':
          description: Successful Response
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /api/dialogue:
    post:
      tags:
      - Dialogue
      summary: Create Dialogue
      operationId: create_dialogue_api_dialogue_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dialogue'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
    delete:
      tags:
      - Dialogue
      summary: Delete Dialogue
      operationId: delete_dialogue_api_dialogue_delete
      parameters:
      - name: dialogue_id
        in: query
        required: true
        schema:
          type: integer
          title: Dialogue Id
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Dialogue
      summary: Change Dialogue
      operationId: change_dialogue_api_dialogue_put
      parameters:
      - name: dialogue_id
        in: query
        required: true
        schema:
          type: integer
          title: Dialogue Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDialogue'
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Dialogue
      summary: Get Dialogue
      operationId: get_dialogue_api_dialogue_get
      parameters:
      - name: dialogue_id
        in: query
        required: true
        schema:
          type: integer
          title: Dialogue Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dialogue'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/dialogue/list:
    get:
      tags:
      - Dialogue
      summary: Get Dialogues
      operationId: get_dialogues_api_dialogue_list_get
      parameters:
      - name: query
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShortDialogue'
                title: Response Get Dialogues Api Dialogue List Get
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/message:
    post:
      tags:
      - Message
      summary: New Message
      operationId: new_message_api_message_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewMessage'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/message/feedback:
    post:
      tags:
      - Message
      summary: Message Feedback
      operationId: message_feedback_api_message_feedback_post
      parameters:
      - name: message_id
        in: query
        required: true
        schema:
          type: integer
          title: Message Id
      - name: feedback
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/MessageFeedbackEnum'
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/source/list:
    get:
      tags:
      - Source
      summary: Sources List
      operationId: sources_list_api_source_list_get
      parameters:
      - name: query
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Query
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 10
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcesList'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/source:
    post:
      tags:
      - Source
      summary: Upload Source
      operationId: upload_source_api_source_post
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_source_api_source_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceForList'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Source
      summary: Get Source
      operationId: get_source_api_source_get
      parameters:
      - name: source_id
        in: query
        required: true
        schema:
          type: integer
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceContent'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Source
      summary: Delete Source
      operationId: delete_source_api_source_delete
      parameters:
      - name: source_id
        in: query
        required: true
        schema:
          type: integer
          title: Source Id
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/source/download:
    get:
      tags:
      - Source
      summary: Download File
      operationId: download_file_api_source_download_get
      parameters:
      - name: source_id
        in: query
        required: true
        schema:
          type: integer
          title: Source Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Not Found
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Unauthorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/code-executor:
    post:
      tags:
      - Code executor
      summary: Execute Code
      operationId: execute_code_api_code_executor_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeExecute'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeExecuteResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    Body_upload_source_api_source_post:
      properties:
        file:
          type: string
          format: binary
          title: File
      type: object
      required:
      - file
      title: Body_upload_source_api_source_post
    ChangeDialogue:
      properties:
        dialogue_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Dialogue Name
      type: object
      title: ChangeDialogue
    CodeExecute:
      properties:
        response_id:
          type: integer
          title: Response Id
        code:
          type: string
          title: Code
      type: object
      required:
      - response_id
      - code
      title: CodeExecute
    CodeExecuteResult:
      properties:
        executed:
          type: boolean
          title: Executed
        output:
          type: string
          title: Output
      type: object
      required:
      - executed
      - output
      title: CodeExecuteResult
    Dialogue:
      properties:
        dialogue_id:
          type: integer
          title: Dialogue Id
        dialogue_name:
          type: string
          title: Dialogue Name
          default: New conversation
        pre_generated_queries:
          items:
            $ref: '#/components/schemas/PreGeneratedQuery'
          type: array
          title: Pre Generated Queries
        messages:
          anyOf:
          - items:
              $ref: '#/components/schemas/DialogueMessage'
            type: array
          - type: 'null'
          title: Messages
      type: object
      required:
      - dialogue_id
      - pre_generated_queries
      title: Dialogue
    DialogueMessage:
      properties:
        messages:
          items:
            $ref: '#/components/schemas/DialogueMessageContent'
          type: array
          title: Messages
        responses:
          items:
            $ref: '#/components/schemas/DialogueMessageResponse'
          type: array
          title: Responses
      type: object
      required:
      - messages
      - responses
      title: DialogueMessage
    DialogueMessageContent:
      properties:
        message_id:
          type: integer
          title: Message Id
        content:
          type: string
          title: Content
      type: object
      required:
      - message_id
      - content
      title: DialogueMessageContent
    DialogueMessageResponse:
      properties:
        message_id:
          type: integer
          title: Message Id
        response_id:
          type: integer
          title: Response Id
        content:
          type: string
          title: Content
        sources:
          items:
            type: integer
          type: array
          title: Sources
      type: object
      required:
      - message_id
      - response_id
      - content
      - sources
      title: DialogueMessageResponse
    ErrorMessage:
      properties:
        detail:
          type: string
          title: Detail
      type: object
      required:
      - detail
      title: ErrorMessage
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    IconsEnum:
      type: string
      enum:
      - database
      - doc
      - browser
      title: IconsEnum
    MessageFeedbackEnum:
      type: string
      enum:
      - like
      - dislike
      title: MessageFeedbackEnum
    MessageResponse:
      properties:
        message_id:
          type: integer
          title: Message Id
        response_id:
          type: integer
          title: Response Id
        content:
          type: string
          title: Content
        sources:
          items:
            type: integer
          type: array
          title: Sources
      type: object
      required:
      - message_id
      - response_id
      - content
      - sources
      title: MessageResponse
    NewMessage:
      properties:
        dialogue_id:
          type: integer
          title: Dialogue Id
        message:
          type: string
          title: Message
        edited_message_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Edited Message Id
      type: object
      required:
      - dialogue_id
      - message
      title: NewMessage
    PreGeneratedQuery:
      properties:
        query:
          type: string
          title: Query
        icon:
          $ref: '#/components/schemas/IconsEnum'
      type: object
      required:
      - query
      - icon
      title: PreGeneratedQuery
    ShortDialogue:
      properties:
        dialogue_id:
          type: integer
          title: Dialogue Id
        dialogue_name:
          type: string
          title: Dialogue Name
      type: object
      required:
      - dialogue_id
      - dialogue_name
      title: ShortDialogue
    SourceContent:
      properties:
        content:
          type: string
          title: Content
      type: object
      required:
      - content
      title: SourceContent
    SourceForList:
      properties:
        source_id:
          type: integer
          title: Source Id
        name:
          type: string
          title: Name
        source_type:
          $ref: '#/components/schemas/SourceType'
        size_bytes:
          type: integer
          title: Size Bytes
        load_timestamp:
          type: integer
          title: Load Timestamp
      type: object
      required:
      - source_id
      - name
      - source_type
      - size_bytes
      - load_timestamp
      title: SourceForList
    SourceType:
      type: string
      enum:
      - md
      - txt
      title: SourceType
    SourcesList:
      properties:
        total_count:
          type: integer
          title: Total Count
        total_size_bytes:
          type: integer
          title: Total Size Bytes
        last_update_timestamp:
          type: number
          title: Last Update Timestamp
        page:
          type: integer
          title: Page
        limit:
          type: integer
          title: Limit
        total_pages:
          type: integer
          title: Total Pages
        sources:
          items:
            $ref: '#/components/schemas/SourceForList'
          type: array
          title: Sources
      type: object
      required:
      - total_count
      - total_size_bytes
      - last_update_timestamp
      - page
      - limit
      - total_pages
      - sources
      title: SourcesList
    User:
      properties:
        user_id:
          type: integer
          title: User Id
        email:
          type: string
          title: Email
        username:
          type: string
          title: Username
      type: object
      required:
      - user_id
      - email
      - username
      title: User
    UserAuth:
      properties:
        email:
          type: string
          title: Email
        password:
          type: string
          title: Password
      type: object
      required:
      - email
      - password
      title: UserAuth
    UserChanges:
      properties:
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        username:
          anyOf:
          - type: string
          - type: 'null'
          title: Username
        old_password:
          anyOf:
          - type: string
          - type: 'null'
          title: Old Password
        new_password:
          anyOf:
          - type: string
          - type: 'null'
          title: New Password
      type: object
      title: UserChanges
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
